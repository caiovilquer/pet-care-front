<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>RotinaPet — cuidado compartilhado, saúde e rotina do seu pet</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Planeje cuidados, compartilhe responsabilidades, organize o histórico de saúde e acompanhe os custos do seu pet em um só lugar.">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="theme-color" content="#F6F2E8">
  <link rel="icon" type="image/x-icon" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700&family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script>
    // Aplica o tema salvo antes do primeiro paint (evita flash)
    (function () {
      try {
        var t = localStorage.getItem('rp-theme');
        if (t === 'light' || t === 'dark') {
          document.documentElement.setAttribute('data-theme', t);
        } else {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      } catch (e) { /* localStorage indisponível */ }
    })();
  </script>
  <script src="env.js"></script>
</head>
<body class="mat-typography">
  <app-root></app-root>
</body>
</html>
