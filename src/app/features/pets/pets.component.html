<div class="pets-page">
  <rp-page-header overline="Seu quintal" title="Meus pets"
                  subtitle="Todos os companheiros sob seus cuidados.">
    @if (canManagePets) { <button mat-flat-button (click)="openPetForm()">
      <mat-icon>add</mat-icon>
      Adicionar pet
    </button> }
  </rp-page-header>

  @if (isLoading) {
    <rp-skeleton variant="cards" [count]="6"></rp-skeleton>
  } @else if (pets.length > 0) {
    <div class="pets-grid">
      @for (pet of pets; track pet.id; let i = $index) {
        <article class="pet-card">
          <a class="pet-link" [routerLink]="['/pets', pet.id]">
            <rp-pet-avatar [name]="pet.name" [species]="pet.species"
                           [photoUrl]="pet.photoUrl" size="lg" [seed]="i">
            </rp-pet-avatar>
            <div class="pet-tx">
              <h3>{{ pet.name }}</h3>
              <span class="pet-species">{{ pet.species }}</span>
            </div>
          </a>
          <div class="pet-actions">
            <button mat-icon-button [routerLink]="['/events/pet', pet.id]"
                    matTooltip="Agenda de {{ pet.name }}">
              <mat-icon>calendar_month</mat-icon>
            </button>
            @if (canManagePets) { <button mat-icon-button (click)="editPet(pet)" matTooltip="Editar">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button (click)="deletePet(pet)" matTooltip="Remover" class="danger">
              <mat-icon>delete_outline</mat-icon>
            </button> }
          </div>
        </article>
      }
    </div>

    @if (totalItems > pageSize) {
      <mat-paginator
        [length]="totalItems"
        [pageSize]="pageSize"
        [pageSizeOptions]="[5, 10, 20]"
        [pageIndex]="currentPage"
        (page)="onPageChange($event)"
        showFirstLastButtons>
      </mat-paginator>
    }
  } @else {
    <rp-empty-state icon="pets" title="Nenhum pet por aqui ainda"
                    message="Cadastre seu primeiro companheiro e comece a cuidar da rotina dele.">
      @if (canManagePets) { <button mat-flat-button (click)="openPetForm()">
        <mat-icon>add</mat-icon>
        Adicionar pet
      </button> }
    </rp-empty-state>
  }
</div>
