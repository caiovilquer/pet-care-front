<div class="auth-container">
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <span class="auth-wordmark">rotina<b>pet</b></span>
        <p class="auth-subtitle">A rotina do seu pet, bem cuidada.</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="email" required>
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">
            Email é obrigatório
          </mat-error>
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')">
            Email deve ser válido
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Senha</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'"
                 formControlName="password" autocomplete="current-password" required>
          <button mat-icon-button matSuffix type="button"
                  (click)="hidePassword = !hidePassword"
                  [attr.aria-label]="hidePassword ? 'Mostrar senha' : 'Ocultar senha'">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
            Senha é obrigatória
          </mat-error>
        </mat-form-field>

        <button mat-flat-button type="submit" class="auth-button full-width"
                [disabled]="loginForm.invalid || isLoading">
          {{ isLoading ? 'Entrando...' : 'Entrar' }}
        </button>

        <div class="auth-links">
          <a routerLink="/auth/forgot-password" mat-button>
            Esqueci minha senha
          </a>
        </div>
      </form>

      <p class="auth-footer">
        Não tem uma conta?
        <a routerLink="/auth/signup">Cadastre-se</a>
      </p>
    </div>
  </div>
</div>
